<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="/Imagens/EarthPNG.png"
      sizes="16x16"
      type="image/png"
    />
    <title>Plataforma de Cursos de Sustentabilidade Infantil</title>
    <link rel="stylesheet" href="../CSS/cursos.css" />
    <link rel="stylesheet" href="../CSS/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <nav class="navbar">
      <a href="/index.html" class="navbar-brand">
        <img src="../Imagens/logo.png" alt="Logo" style="width: 220px" />
      </a>
      <ul class="nav">
        <li class="nav-item">
          <a class="nav-link" href="/HTML/cursos.html">Cursos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/HTML/certificados.html">Certificados</a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            href="/HTML/usuarios.html"
            id="nav-usuarios"
            style="display: none"
            >Usuários</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/HTML/login.html" id="nav-login">Login</a>
        </li>
      </ul>
    </nav>
    <main>
      <div id="admin-actions" class="mb-4" style="display: none">
        <button
          class="btn btn-success fw-bold px-4 py-2"
          data-bs-toggle="modal"
          data-bs-target="#courseModal"
        >
          + Novo
        </button>
      </div>

      <div
        class="modal fade"
        id="courseModal"
        tabindex="-1"
        aria-labelledby="courseModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog" style="color: black">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="courseModalLabel">Criar Curso</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <form id="createCourseForm">
              <input type="hidden" id="courseId" />
              <div class="modal-body text-start">
                <div class="mb-3">
                  <label for="courseTitle" class="form-label"
                    >Título do Curso</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="courseTitle"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="courseDescription" class="form-label"
                    >Descrição</label
                  >
                  <textarea
                    class="form-control"
                    id="courseDescription"
                    rows="3"
                    required
                  ></textarea>
                </div>
                <div class="mb-3">
                  <label for="courseCoverImage" class="form-label"
                    >URL da Imagem de Capa</label
                  >
                  <input
                    type="url"
                    class="form-control"
                    id="courseCoverImage"
                    placeholder="https://exemplo.com/imagem.png"
                  />
                </div>
                <div class="mb-3">
                  <label for="courseVideoUrl" class="form-label"
                    >URL do Vídeo</label
                  >
                  <input
                    type="url"
                    class="form-control"
                    id="courseVideoUrl"
                    placeholder="https://exemplo.com/video.mp4"
                  />
                </div>
                <div
                  id="modal-error"
                  class="text-danger mt-2"
                  style="display: none"
                ></div>
              </div>
              <div class="modal-footer d-flex justify-content-between">
                <button
                  type="button"
                  class="btn btn-danger"
                  id="deleteCourseBtn"
                  style="display: none"
                >
                  Excluir
                </button>
                <div>
                  <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                  >
                    Cancelar
                  </button>
                  <button type="submit" class="btn btn-success">Salvar</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div
        id="courses-container"
        class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mt-2"
      >
        <div class="col w-100 text-center">
          <p>Carregando cursos...</p>
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Plataforma de Cursos de Sustentabilidade Infantil</p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/global.js"></script>
    <script src="../JS/cursos.js"></script>
    <script src="../JS/auth-sync.js"></script>
  </body>
</html>
